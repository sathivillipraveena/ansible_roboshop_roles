  - name: mysql installation
    ansible.builtin.dnf:
      name: mysql-server
      state: present
  
  - name: mysql service starting
    ansible.builtin.service:
      name: mysqld
      state: started
      enable: yes
      
  - name: setp root password
    ansible.builtin.command: mysql_secure_installation --set-root-pass RoboShop@1
